<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wing 🪽 v2.0</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0f172a;
color:white;
height:100vh;
}

.hidden{
display:none;
}

/* LOGIN */

#authPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.auth-box{
width:90%;
max-width:380px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(12px);
padding:30px;
border-radius:20px;
text-align:center;
}

.logo{
font-size:55px;
margin-bottom:10px;
}

.auth-box h1{
margin-bottom:20px;
}

.auth-box input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:12px;
outline:none;
}

.auth-box button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:white;
color:#2563eb;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

/* CHAT */

#chatPage{
display:flex;
height:100vh;
}

.sidebar{
width:280px;
background:#111827;
padding:20px;
overflow:auto;
}

.sidebar h2{
margin-bottom:20px;
}

.group{
background:#1e293b;
padding:12px;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
}

.chat-area{
flex:1;
display:flex;
flex-direction:column;
background:#0f172a;
}

.topbar{
padding:15px;
background:#1e293b;
font-weight:bold;
font-size:18px;
}

.messages{
flex:1;
overflow:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
padding:12px;
max-width:75%;
border-radius:15px;
}

.received{
background:#334155;
align-self:flex-start;
}

.sent{
background:#2563eb;
align-self:flex-end;
}

.input-area{
display:flex;
padding:10px;
background:#1e293b;
}

.input-area input{
flex:1;
padding:12px;
border:none;
border-radius:25px;
outline:none;
}

.input-area button{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:25px;
background:#2563eb;
color:white;
cursor:pointer;
}

@media(max-width:768px){

.sidebar{
width:100px;
}

.sidebar h2{
font-size:16px;
}

.group{
font-size:12px;
}
}
</style>
</head>
<body>

<!-- LOGIN PAGE -->

<div id="authPage">

<div class="auth-box">

<div class="logo">🪽</div>

<h1>Wing</h1>

<input type="text" id="username" placeholder="Username">

<input type="password" placeholder="Password">

<button onclick="login()">Login / Signup</button>

</div>

</div>

<!-- CHAT PAGE -->

<div id="chatPage" class="hidden">

<div class="sidebar">

<h2>🪽 Wing</h2>

<div class="group">👥 General Chat</div>
<div class="group">🔥 Friends</div>
<div class="group">🎮 Gamers</div>
<div class="group">📚 Study Group</div>

</div>

<div class="chat-area">

<div class="topbar">
👥 General Chat
</div>

<div class="messages" id="messages">

<div class="message received">
Welcome to Wing 🪽
</div>

</div>

<div class="input-area">

<input type="text" id="msgInput"
placeholder="Type message...">

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

</div>

<script>

function login(){

let user =
document.getElementById("username").value;

if(user.trim()==""){
alert("Enter Username");
return;
}

document.getElementById("authPage")
.classList.add("hidden");

document.getElementById("chatPage")
.classList.remove("hidden");
}

function sendMessage(){

let input =
document.getElementById("msgInput");

let text=input.value.trim();

if(text=="") return;

let msg=document.createElement("div");

msg.className="message sent";

msg.innerText=text;

document.getElementById("messages")
.appendChild(msg);

input.value="";

document.getElementById("messages")
.scrollTop=
document.getElementById("messages")
.scrollHeight;
}

</script>

</body>
</html>
